<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Videos - EZC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 50px;
            height: 50px;
            margin-right: 16px;
            border-radius: 6px;
        }

        .header-content {
            flex: 1;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #030303;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: #5f6368;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #FF0000;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #e50000;
        }

        .btn-secondary {
            background: #e8e8e8;
            color: #030303;
        }

        .btn-secondary:hover {
            background: #d3d3d3;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .video-card {
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: move;
            user-select: none;
            -webkit-user-select: none;
        }

        .video-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .video-card.dragging {
            opacity: 0.5;
            transform: scale(0.95) rotate(5deg);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: #f9f9f9;
            z-index: 1000;
        }

        .video-card.drag-over {
            transform: scale(1.02);
            background: #f0f0f0;
            box-shadow: 0 6px 16px rgba(255, 0, 0, 0.2);
            border: 2px solid #FF0000;
        }

        .video-card.drag-over-left {
            border-left: 4px solid #FF0000;
            border: none;
            border-left: 4px solid #FF0000;
        }

        .video-card.drag-over-right {
            border-right: 4px solid #FF0000;
            border: none;
            border-right: 4px solid #FF0000;
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .video-thumbnail::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }

        .play-icon {
            position: relative;
            z-index: 2;
            width: 60px;
            height: 60px;
            background: #FF0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .video-card:hover .play-icon {
            background: #ffffff;
            color: #FF0000;
            transform: scale(1.1);
        }

        .video-info {
            padding: 16px;
        }

        .video-title {
            font-size: 14px;
            font-weight: 600;
            color: #030303;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .video-details {
            font-size: 12px;
            color: #5f6368;
            line-height: 1.5;
        }

        .video-size {
            display: inline-block;
            margin-right: 12px;
        }

        .video-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e8e8e8;
        }

        .video-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 4px;
        }

        .btn-audio {
            background: #4285F4;
            color: #ffffff;
        }

        .btn-audio:hover {
            background: #3972D4;
        }

        .btn-delete {
            background: #f5f5f5;
            color: #d32f2f;
        }

        .btn-delete:hover {
            background: #e8e8e8;
        }

        .empty-state {
            background: #ffffff;
            border-radius: 8px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: #030303;
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #5f6368;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e8e8e8;
            border-top-color: #FF0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .error {
            background: #fce8e6;
            border: 1px solid #f1dce0;
            color: #c5221f;
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .stats {
            background: #ffffff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #FF0000;
        }

        .stat-label {
            font-size: 12px;
            color: #5f6368;
            margin-top: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 8px;
            padding: 24px;
            max-width: 400px;
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #030303;
            margin-bottom: 12px;
        }

        .modal-text {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-actions button {
            padding: 10px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icons/EZC.png" alt="EZC" class="logo">
            <div class="header-content">
                <div class="title">Easy, see?</div>
                <div class="subtitle">Click any video to play • Use 🎵 to download audio</div>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" id="refreshBtn">Refresh</button>
                <button class="btn-secondary" id="playAllBtn">Play All</button>
                <button class="btn-primary" id="downloadBtn">New Download</button>
            </div>
        </div>

        <div id="stats" class="stats" style="display: none;">
            <div class="stat-item">
                <div class="stat-value" id="videoCount">0</div>
                <div class="stat-label">Videos</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalSize">0 MB</div>
                <div class="stat-label">Total Size</div>
            </div>
        </div>

        <div id="errorMsg" class="error" style="display: none;"></div>

        <div id="loadingState" class="loading">
            <div class="loading-spinner"></div>
            <div>Loading videos...</div>
        </div>

        <div id="videosContainer" class="videos-grid" style="display: none;"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">🎬</div>
            <div class="empty-title">No videos yet</div>
            <div class="empty-text">Download YouTube videos to see them here</div>
            <button class="btn-primary" id="emptyDownloadBtn">Start Downloading</button>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-title">Delete Video?</div>
            <div class="modal-text" id="deleteVideoName"></div>
            <div class="modal-actions">
                <button class="btn-secondary" type="button">Cancel</button>
                <button class="btn-delete" type="button">Delete</button>
            </div>
        </div>
    </div>

    <script src="downloads-view.js"></script>
</body>
</html>
