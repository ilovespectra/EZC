<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZC YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 350px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #030303;
        }

        .container {
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 40px;
            height: 40px;
            margin-right: 12px;
            border-radius: 4px;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            color: #030303;
        }

        .url-section {
            margin-bottom: 16px;
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            color: #606060;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }

        .url-display {
            background: #f5f5f5;
            border: 1px solid #d3d3d3;
            border-radius: 4px;
            padding: 10px;
            font-size: 12px;
            color: #030303;
            word-break: break-all;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        .url-display.empty {
            color: #909090;
        }

        .quality-section {
            margin-bottom: 16px;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d3d3d3;
            border-radius: 4px;
            font-size: 14px;
            background: #ffffff;
            color: #030303;
            cursor: pointer;
            font-weight: 500;
        }

        select:hover {
            border-color: #808080;
        }

        select:focus {
            outline: none;
            border-color: #FF0000;
            box-shadow: 0 0 0 2px rgba(255, 0, 0, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .download-btn {
            background: #FF0000;
            color: #ffffff;
            width: 100%;
        }

        .download-btn:hover {
            background: #e50000;
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .download-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .downloads-btn {
            background: #FF0000;
            color: #ffffff;
            width: auto;
            padding: 12px 12px;
            font-size: 18px;
        }

        .downloads-btn:hover {
            background: #e50000;
        }

        .downloads-btn:active {
            transform: scale(0.98);
        }

        .status-section {
            margin-top: 16px;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }

        .status-section.show {
            display: block;
        }

        .status-success {
            background: #e6f4ea;
            color: #137333;
            border: 1px solid #a8d5ba;
        }

        .status-error {
            background: #fce8e6;
            color: #c5221f;
            border: 1px solid #f1dce0;
        }

        .status-info {
            background: #e8f0fe;
            color: #1f2937;
            border: 1px solid #d2d9f7;
        }

        .note {
            margin-top: 12px;
            font-size: 11px;
            color: #5f6368;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icons/EZC.png" alt="EZC" class="logo">
            <div class="title">Easy, see?</div>
        </div>

        <div class="url-section">
            <label class="label">Video URL</label>
            <div class="url-display empty" id="urlDisplay">No URL detected</div>
        </div>

        <div class="quality-section">
            <label class="label" for="quality">Quality</label>
            <select id="quality">
                <option value="best">Best Available</option>
                <option value="1080">1080p</option>
                <option value="720">720p</option>
                <option value="480">480p</option>
                <option value="360">360p</option>
            </select>
        </div>

        <div class="button-group">
            <button class="download-btn" id="downloadBtn" title="Download this YouTube video">⬇️ Download</button>
            <button class="downloads-btn" id="viewDownloadsBtn" title="View downloaded videos">📁</button>
        </div>

        <div class="status-section" id="statusSection">
            <div id="statusMessage"></div>
        </div>

        <div class="note">
            Downloads are saved and can be played in the downloads gallery. The server must be running locally on port 9234.
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
