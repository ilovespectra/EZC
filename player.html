<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - EZC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .player-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000000;
        }

        .video-header {
            background: #1a1a1a;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .video-title {
            font-size: 16px;
            color: #ffffff;
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000000;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .controls-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.9) 100%);
            padding: 20px 16px 16px;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .video-wrapper:hover .controls-container {
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.95) 100%);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 12px;
            position: relative;
        }

        .progress-bar:hover {
            height: 6px;
            margin-bottom: 11px;
        }

        .progress-fill {
            background: #FF0000;
            height: 100%;
            border-radius: 2px;
            width: 0%;
        }

        .time-display {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 12px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .right-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="range"] {
            width: 80px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #FF0000;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #FF0000;
            cursor: pointer;
            border: none;
        }

        .speed-control {
            position: relative;
        }

        .speed-menu {
            position: absolute;
            bottom: 40px;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            display: none;
            min-width: 80px;
            z-index: 10;
        }

        .speed-menu.show {
            display: block;
        }

        .speed-option {
            display: block;
            width: 100%;
            padding: 8px 12px;
            background: none;
            border: none;
            color: #ffffff;
            text-align: left;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .speed-option:hover {
            background: rgba(255, 0, 0, 0.3);
        }

        .speed-option.active {
            background: rgba(255, 0, 0, 0.5);
            font-weight: 600;
        }

        .menu-popup {
            position: fixed;
            top: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px;
            width: 250px;
            height: 100vh;
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        .menu-popup.show {
            display: flex;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 12px;
        }

        .menu-title {
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
        }

        .menu-close {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
        }

        .menu-option {
            color: #ffffff;
            padding: 12px;
            border: none;
            background: none;
            text-align: left;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .menu-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 50;
        }

        .overlay.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #FF0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="video-header">
            <div class="video-title" id="videoTitle">Loading video...</div>
            <button class="menu-btn" id="menuBtn">☰</button>
        </div>

        <div class="video-wrapper">
            <div class="loading" id="loadingState">
                <div class="loading-spinner"></div>
                <div>Loading video file...</div>
            </div>
            <video id="videoPlayer" style="display: none;"></video>

            <div class="controls-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                </div>
                <div class="controls">
                    <div class="left-controls">
                        <button id="playBtn" title="Play/Pause">▶</button>
                        <div class="volume-control">
                            <button id="volumeBtn" title="Mute">🔊</button>
                            <input type="range" id="volumeSlider" min="0" max="100" value="100" title="Volume">
                        </div>
                    </div>
                    <div class="right-controls">
                        <div class="speed-control">
                            <button id="speedBtn" title="Speed">1x</button>
                            <div class="speed-menu" id="speedMenu">
                                <button class="speed-option" data-speed="0.25">0.25x</button>
                                <button class="speed-option" data-speed="0.5">0.5x</button>
                                <button class="speed-option" data-speed="0.75">0.75x</button>
                                <button class="speed-option active" data-speed="1">1x</button>
                                <button class="speed-option" data-speed="1.25">1.25x</button>
                                <button class="speed-option" data-speed="1.5">1.5x</button>
                                <button class="speed-option" data-speed="2">2x</button>
                            </div>
                        </div>
                        <button id="prevBtn" title="Previous video" style="display: none;">⏮</button>
                        <button id="nextBtn" title="Next video" style="display: none;">⏭</button>
                        <button id="fullscreenBtn" title="Fullscreen">⛶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="menu-popup" id="menuPopup">
        <div class="menu-header">
            <div class="menu-title">Menu</div>
            <button class="menu-close" id="menuCloseBtn">✕</button>
        </div>
        <button class="menu-option" id="closePlayerBtn">Close Player</button>
        <button class="menu-option" id="helpBtn">About EZC</button>
    </div>

    <script src="player.js"></script>
</body>
</html>
